<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riskan | Certificates</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0a0a0a;
      color: #00ffff;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 2.5rem;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
      margin-bottom: 40px;
    }

    .cert-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      max-width: 1000px;
      margin: auto;
    }

    .cert-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #00ffff;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 0 15px #00ffff33;
      transition: 0.3s;
    }

    .cert-card:hover {
      box-shadow: 0 0 25px #00ffff99;
      transform: translateY(-5px);
    }

    .cert-card h3 {
      color: #fff;
      margin-bottom: 15px;
      text-shadow: 0 0 8px #00ffff;
    }

    .cert-card a {
      display: inline-block;
      margin: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      color: #fff;
      background: #00ffff;
      font-weight: 600;
      transition: 0.3s;
    }

    .cert-card a:hover {
      background: #fff;
      color: #00ffff;
      box-shadow: 0 0 10px #00ffff;
    }
  </style>
</head>
<body>
  <h1>🏅 My Certifications</h1>

  <div class="cert-container">

    <div class="cert-card">
      <h3>📘 Front-End Web Development</h3>
      <a href="https://chipper-maamoul-f84522.netlify.app/" target="_blank">Live Demo</a>
      <a href="https://riskanahamed.github.io/My_Portfolio/Front-End_Web_Development_E-Certificate_page.pdf" target="_blank">Certificate PDF</a>
    </div>

    <div class="cert-card">
      <h3>📘 Python for Beginners</h3>
      <a href="https://chipper-maamoul-f84522.netlify.app/" target="_blank">Live Demo</a>
      <a href="https://riskanahamed.github.io/My_Portfolio/Python_for_Beginners_E-Certificate_page.pdf" target="_blank">Certificate PDF</a>
    </div>

    <div class="cert-card">
      <h3>📘 Web Design for Beginners</h3>
      <a href="https://chipper-maamoul-f84522.netlify.app/" target="_blank">Live Demo</a>
      <a href="https://riskanahamed.github.io/My_Portfolio/Web_Design_for_Beginners_E-Certificate_page.pdf" target="_blank">Certificate PDF</a>
    </div>

    <div class="cert-card">
      <h3>📘 Professional Networking for Career Growth</h3>
      <a href="https://chipper-maamoul-f84522.netlify.app/" target="_blank">Live Demo</a>
      <a href="https://riskanahamed.github.io/My_Portfolio/Professional_Networking_for_Career_Growth.pdf" target="_blank">Certificate PDF</a>
    </div>

  </div>
</body>
</html>
